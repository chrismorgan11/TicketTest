<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 40px;
        }

        h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        button.danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 1em;
            opacity: 0.9;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-open {
            background: #d4edda;
            color: #155724;
        }

        .status-closed {
            background: #f8d7da;
            color: #721c24;
        }

        .actions {
            display: flex;
            gap: 5px;
        }

        .action-btn {
            padding: 5px 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-size: 1.2em;
        }

        .filter-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-bar span {
            font-weight: 600;
            color: #555;
        }

        .filter-btn {
            padding: 6px 18px;
            font-size: 14px;
            border-radius: 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s, color 0.2s;
        }

        .filter-btn:hover {
            background: #667eea;
            color: white;
            transform: none;
            box-shadow: none;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        th.sortable {
            cursor: pointer;
            user-select: none;
        }

        th.sortable:hover {
            opacity: 0.85;
        }

        th .sort-indicator {
            margin-left: 5px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Ticket Management System</h1>
            <p class="subtitle">Track and manage support tickets with database backend</p>
        </header>

        <div class="content">
            <div id="alertContainer"></div>

            <div class="section">
                <h2>Add New Ticket</h2>
                <form id="ticketForm">
                    <div class="form-group">
                        <label for="source">Source:</label>
                        <input type="text" id="source" required placeholder="e.g., service now, dell, databank">
                    </div>
                    <div class="form-group">
                        <label for="ticket">Ticket Number:</label>
                        <input type="text" id="ticket" required placeholder="e.g., RITM0000010759952">
                    </div>
                    <div class="form-group">
                        <label for="date">Date:</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="details">Details:</label>
                        <textarea id="details" required placeholder="Describe the issue or request"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="status">Status:</label>
                        <select id="status">
                            <option value="Open">Open</option>
                            <option value="Closed">Closed</option>
                        </select>
                    </div>
                    <div class="button-group">
                        <button type="submit">Add Ticket</button>
                        <button type="button" id="cancelEditBtn" class="danger" onclick="cancelEdit()" style="display:none;">Cancel Edit</button>
                        <button type="button" class="secondary" onclick="exportCSV()">Export to CSV</button>
                        <button type="button" class="secondary" onclick="refreshTickets()">Refresh</button>
                    </div>
                </form>
            </div>

            <div class="section">
                <h2>Ticket Statistics</h2>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalTickets">0</div>
                        <div class="stat-label">Total Tickets</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="uniqueSources">0</div>
                        <div class="stat-label">Unique Sources</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>Current Tickets</h2>
                <div class="filter-bar">
                    <span>Show:</span>
                    <button class="filter-btn active" onclick="setFilter('all')">All</button>
                    <button class="filter-btn" onclick="setFilter('open')">Open</button>
                    <button class="filter-btn" onclick="setFilter('closed')">Closed</button>
                </div>
                <div id="loadingIndicator" class="loading" style="display: none;">Loading tickets...</div>
                <div class="table-container">
                    <table id="ticketsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Source</th>
                                <th>Ticket</th>
                                <th>Date</th>
                                <th>Details</th>
                                <th class="sortable" onclick="toggleStatusSort()" id="statusHeader">Status <span class="sort-indicator">&#8597;</span></th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ticketsBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Set today's date as default
        document.getElementById('date').valueAsDate = new Date();

        // Load tickets on page load
        window.addEventListener('load', function() {
            loadTickets();
            loadStats();
        });

        // Load tickets from API
        async function loadTickets() {
            try {
                document.getElementById('loadingIndicator').style.display = 'block';
                const response = await fetch(`${API_BASE}/api/tickets`);

                if (!response.ok) {
                    throw new Error('Failed to load tickets');
                }

                const data = await response.json();
                allTickets = data.tickets;
                applyFilterAndSort();
                document.getElementById('loadingIndicator').style.display = 'none';
            } catch (error) {
                console.error('Error loading tickets:', error);
                showAlert('Error loading tickets: ' + error.message, 'error');
                document.getElementById('loadingIndicator').style.display = 'none';
            }
        }

        // Load statistics from API
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/api/stats`);

                if (!response.ok) {
                    throw new Error('Failed to load statistics');
                }

                const data = await response.json();
                document.getElementById('totalTickets').textContent = data.totalTickets;
                document.getElementById('uniqueSources').textContent = data.uniqueSources;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function setFilter(value) {
            statusFilter = value;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            applyFilterAndSort();
        }

        function toggleStatusSort() {
            if (statusSort === null) statusSort = 'asc';
            else if (statusSort === 'asc') statusSort = 'desc';
            else statusSort = null;

            const indicator = document.querySelector('#statusHeader .sort-indicator');
            indicator.innerHTML = statusSort === 'asc' ? '&#8593;' : statusSort === 'desc' ? '&#8595;' : '&#8597;';
            applyFilterAndSort();
        }

        function applyFilterAndSort() {
            let tickets = allTickets.slice();

            if (statusFilter !== 'all') {
                tickets = tickets.filter(t => (t.status || 'Open').toLowerCase() === statusFilter);
            }

            if (statusSort !== null) {
                tickets.sort((a, b) => {
                    const sa = (a.status || 'Open').toLowerCase();
                    const sb = (b.status || 'Open').toLowerCase();
                    if (sa < sb) return statusSort === 'asc' ? -1 : 1;
                    if (sa > sb) return statusSort === 'asc' ? 1 : -1;
                    return 0;
                });
            }

            displayTickets(tickets);
        }

        // Display tickets in table
        function displayTickets(tickets) {
            const tbody = document.getElementById('ticketsBody');
            tbody.innerHTML = '';

            if (tickets.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 30px; color: #999;">No tickets found. Add your first ticket above!</td></tr>';
                return;
            }

            tickets.forEach(ticket => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = ticket.id;
                row.insertCell(1).textContent = ticket.source;
                row.insertCell(2).textContent = ticket.ticket;
                row.insertCell(3).textContent = ticket.date;
                row.insertCell(4).textContent = ticket.details;

                const statusCell = row.insertCell(5);
                const status = ticket.status || 'Open';
                statusCell.innerHTML = `<span class="status-badge status-${status.toLowerCase()}">${status}</span>`;

                const actionsCell = row.insertCell(6);
                actionsCell.innerHTML = `
                    <div class="actions">
                        <button class="action-btn secondary" onclick="editTicket(${ticket.id})">Edit</button>
                    </div>
                `;
            });
        }

        let editingId = null;
        let allTickets = [];
        let statusFilter = 'all';
        let statusSort = null; // null | 'asc' | 'desc'

        // Handle form submission
        document.getElementById('ticketForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const source = document.getElementById('source').value.toLowerCase().trim();
            const ticket = document.getElementById('ticket').value.trim();
            const dateValue = document.getElementById('date').value;
            const details = document.getElementById('details').value.trim();
            const status = document.getElementById('status').value;

            // Convert date to MM-DD-YYYY format
            const dateObj = new Date(dateValue);
            const formattedDate = `${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}-${dateObj.getFullYear()}`;

            const ticketData = { source, ticket, date: formattedDate, details, status };

            try {
                const isEdit = editingId !== null;
                const response = await fetch(`${API_BASE}/api/tickets${isEdit ? '/' + editingId : ''}`, {
                    method: isEdit ? 'PUT' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(ticketData)
                });

                if (!response.ok) {
                    throw new Error(isEdit ? 'Failed to update ticket' : 'Failed to create ticket');
                }

                showAlert(isEdit ? 'Ticket updated successfully!' : 'Ticket added successfully!', 'success');
                cancelEdit();
                await loadTickets();
                await loadStats();
            } catch (error) {
                console.error('Error saving ticket:', error);
                showAlert('Error saving ticket: ' + error.message, 'error');
            }
        });

        // Populate form for editing
        async function editTicket(id) {
            try {
                const response = await fetch(`${API_BASE}/api/tickets/${id}`);
                if (!response.ok) throw new Error('Failed to load ticket');
                const data = await response.json();
                const t = data.ticket;

                editingId = id;
                document.getElementById('source').value = t.source;
                document.getElementById('ticket').value = t.ticket;
                document.getElementById('details').value = t.details;
                document.getElementById('status').value = t.status || 'Open';

                // Convert MM-DD-YYYY to YYYY-MM-DD for date input
                const parts = t.date.split('-');
                if (parts.length === 3) {
                    document.getElementById('date').value = `${parts[2]}-${parts[0]}-${parts[1]}`;
                }

                document.querySelector('#ticketForm button[type="submit"]').textContent = 'Update Ticket';
                document.getElementById('cancelEditBtn').style.display = 'inline-block';
                document.getElementById('ticketForm').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                showAlert('Error loading ticket: ' + error.message, 'error');
            }
        }

        function cancelEdit() {
            editingId = null;
            document.getElementById('ticketForm').reset();
            document.getElementById('date').valueAsDate = new Date();
            document.querySelector('#ticketForm button[type="submit"]').textContent = 'Add Ticket';
            document.getElementById('cancelEditBtn').style.display = 'none';
        }

        // Export to CSV
        async function exportCSV() {
            try {
                const response = await fetch(`${API_BASE}/api/export`);

                if (!response.ok) {
                    throw new Error('Failed to export tickets');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'tickets.csv';
                link.click();
                window.URL.revokeObjectURL(url);

                showAlert('CSV exported successfully!', 'success');
            } catch (error) {
                console.error('Error exporting CSV:', error);
                showAlert('Error exporting CSV: ' + error.message, 'error');
            }
        }

        // Refresh tickets
        async function refreshTickets() {
            await loadTickets();
            await loadStats();
            showAlert('Tickets refreshed!', 'success');
        }

        // Show alert message
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 5000);
        }
    </script>
</body>
</html>
